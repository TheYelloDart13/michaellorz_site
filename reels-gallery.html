<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Reels & Gallery | Michael Lorz</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700;9..144,900&family=Inter:wght@400;600&display=swap" rel="stylesheet">

<body>
  <!-- Navigation -->
  <nav>
    <div class="container">
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="reels-gallery.html">Reels & Gallery</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </div>
  </nav>

  <!-- Reels Section -->
  <section class="reels-section">
    <div class="container">
      <div class="section-header">
        <h1>Reels</h1>
      </div>

      <!-- Reels Grid -->
      <div class="reel-grid">
        <div class="reel-item">
          <h3>TV/Film Reel</h3>
          <div class="video-wrapper">
            <iframe 
              src="https://player.vimeo.com/video/825700628" 
              title="TV/Film Reel" 
              frameborder="0" 
              allow="autoplay; fullscreen; picture-in-picture" 
              allowfullscreen>
            </iframe>
          </div>
        </div>

        <div class="reel-item">
          <h3>Comedy Reel</h3>
          <div class="video-wrapper">
            <iframe 
              src="https://player.vimeo.com/video/1168352703" 
              title="Comedy Reel" 
              frameborder="0" 
              allow="autoplay; fullscreen; picture-in-picture" 
              allowfullscreen>
            </iframe>
          </div>
        </div>

        <div class="reel-item">
          <h3>Anime Reel</h3>
          <div class="video-wrapper">
            <iframe 
              src="https://player.vimeo.com/video/1125347269" 
              title="Anime Reel" 
              frameborder="0" 
              allow="autoplay; fullscreen; picture-in-picture" 
              allowfullscreen>
            </iframe>
          </div>
        </div>

        <div class="reel-item">
          <h3>Groundlings</h3>
          <div class="video-wrapper">
            <iframe 
              src="https://player.vimeo.com/video/881019178" 
              title="Groundlings" 
              frameborder="0" 
              allow="autoplay; fullscreen; picture-in-picture" 
              allowfullscreen>
            </iframe>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Gallery Section -->
  <section class="gallery-section">
    <div class="container">
      <div class="section-header">
        <h2>Gallery</h2>
      </div>

      <div class="gallery-embed">
        <iframe 
          src="https://michaellorz.pixieset.com/michaellorz/" 
          title="Michael Lorz Gallery"
          frameborder="0"
          allowfullscreen>
        </iframe>
      </div>
    </div>
  </section>

  <!-- Lightbox -->
  <div class="lightbox">
    <button class="lightbox-close" aria-label="Close lightbox">&times;</button>
    <div class="lightbox-content">
      <img src="" alt="">
    </div>
  </div>

  <!-- Footer -->
  <footer>
    <div class="container">
      <p>&copy; 2026 Michael Lorz. All rights reserved.</p>
    </div>

  <script src="script.js"></script>
